<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scanner</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111; color:#fff; font-family:-apple-system,BlinkMacSystemFont,sans-serif; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }
#header { padding:14px 16px; background:#000; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
h2 { font-size:17px; font-weight:700; }
#close-btn { background:rgba(255,255,255,.15); border:none; color:#fff; padding:9px 16px; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; }
#reader-wrap { flex:1; position:relative; overflow:hidden; background:#000; min-height:0; display:flex; align-items:center; justify-content:center; }
#reader { width:100%; height:100%; }
/* Forcer le style html5-qrcode */
#reader video { object-fit:cover !important; width:100% !important; height:100% !important; }
#reader canvas { display:none !important; }
#result-banner { display:none; position:absolute; inset:0; background:rgba(0,160,0,.95); flex-direction:column; align-items:center; justify-content:center; gap:14px; z-index:10; }
#result-banner.show { display:flex; }
#result-code { font-size:26px; font-weight:900; font-family:monospace; letter-spacing:2px; text-align:center; padding:0 24px; word-break:break-all; }
#status-bar { padding:10px 16px; background:#000; text-align:center; font-size:13px; color:rgba(255,255,255,.7); flex-shrink:0; min-height:40px; display:flex; align-items:center; justify-content:center; }
#manual-wrap { padding:12px 16px; background:#1a1a1a; display:flex; gap:8px; flex-shrink:0; border-top:1px solid #333; }
#manual-input { flex:1; background:#2a2a2a; border:1px solid #555; color:#fff; padding:12px 14px; border-radius:10px; font-size:16px; -webkit-appearance:none; outline:none; }
#manual-input:focus { border-color:#2563eb; }
#manual-btn { background:#2563eb; color:#fff; border:none; padding:12px 20px; border-radius:10px; font-weight:700; cursor:pointer; font-size:15px; white-space:nowrap; }
</style>
</head>
<body>

<div id="header">
  <h2 id="title">📷 Scanner</h2>
  <button id="close-btn" onclick="closeScanner()">✕</button>
</div>

<div id="reader-wrap">
  <div id="reader"></div>
  <div id="result-banner">
    <div style="font-size:60px">✅</div>
    <div id="result-code"></div>
  </div>
</div>

<div id="status-bar">Chargement du scanner...</div>

<div id="manual-wrap">
  <input id="manual-input" type="text" placeholder="Entrer manuellement..." 
    autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false"/>
  <button id="manual-btn" onclick="submitManual()">✓ OK</button>
</div>

<!-- html5-qrcode: la librairie la plus compatible iOS/Android -->
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<script>
var params = new URLSearchParams(window.location.search);
var mode = params.get('mode') || 'loc';
var done = false;
var scanner = null;

document.getElementById('title').textContent = mode === 'loc' ? '📍 Scanner Localisation' : '📦 Scanner Pièce';

function setStatus(msg, color) {
  var el = document.getElementById('status-bar');
  el.textContent = msg;
  el.style.color = color || 'rgba(255,255,255,.7)';
}

function sendResult(clean) {
  try { if (window.opener) window.opener.postMessage({type:'SCAN_RESULT',mode:mode,value:clean}, '*'); } catch(e){}
  try { if (window.parent !== window) window.parent.postMessage({type:'SCAN_RESULT',mode:mode,value:clean}, '*'); } catch(e){}
  try { localStorage.setItem('scanner_result', JSON.stringify({type:'SCAN_RESULT',mode:mode,value:clean,ts:Date.now()})); } catch(e){}
}

function submitResult(value) {
  if (done) return;
  done = true;
  var clean = (value || '').trim().toUpperCase();
  if (!clean) return;

  // Arrêter le scanner
  if (scanner) {
    try { scanner.stop(); } catch(e){}
    scanner = null;
  }

  // Afficher succès
  document.getElementById('result-code').textContent = clean;
  document.getElementById('result-banner').classList.add('show');
  setStatus('✅ Code détecté !', '#4ade80');

  sendResult(clean);
  setTimeout(closeScanner, 900);
}

function submitManual() {
  var val = document.getElementById('manual-input').value.trim();
  if (val) submitResult(val);
}

document.getElementById('manual-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') submitManual();
});

function closeScanner() {
  if (scanner) { try { scanner.stop(); } catch(e){} scanner = null; }
  try { window.close(); } catch(e){}
}

function startScanner() {
  if (typeof Html5Qrcode === 'undefined') {
    setStatus('❌ Librairie non chargée — entrez manuellement', '#ef4444');
    document.getElementById('manual-input').focus();
    return;
  }

  scanner = new Html5Qrcode('reader', { verbose: false });

  var config = {
    fps: 15,
    qrbox: function(w, h) {
      var size = Math.min(w, h) * 0.7;
      return { width: Math.round(size), height: Math.round(size * 0.6) };
    },
    aspectRatio: window.innerHeight / window.innerWidth,
    formatsToSupport: [
      Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.CODE_39,
      Html5QrcodeSupportedFormats.CODE_93,
      Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.UPC_A,
      Html5QrcodeSupportedFormats.UPC_E,
      Html5QrcodeSupportedFormats.ITF,
      Html5QrcodeSupportedFormats.QR_CODE,
      Html5QrcodeSupportedFormats.DATA_MATRIX,
      Html5QrcodeSupportedFormats.PDF_417,
    ]
  };

  setStatus('Démarrage de la caméra...');

  // Essayer caméra arrière d'abord
  scanner.start(
    { facingMode: 'environment' },
    config,
    function(decodedText) { submitResult(decodedText); },
    function(err) { /* erreurs de scan normales, ignorer */ }
  ).then(function() {
    setStatus('📷 Pointez vers le code-barres...');
  }).catch(function(err) {
    // Fallback: n'importe quelle caméra
    scanner.start(
      { facingMode: 'user' },
      config,
      function(decodedText) { submitResult(decodedText); },
      function(err) {}
    ).then(function() {
      setStatus('📷 Pointez vers le code-barres...');
    }).catch(function(err2) {
      setStatus('❌ Caméra inaccessible — entrez manuellement ↓', '#ef4444');
      document.getElementById('manual-input').focus();
    });
  });
}

// Démarrer quand la page est prête
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', startScanner);
} else {
  startScanner();
}

window.addEventListener('beforeunload', function() {
  if (scanner) { try { scanner.stop(); } catch(e){} }
});
</script>
</body>
</html>
