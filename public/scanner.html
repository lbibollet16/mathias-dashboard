<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scanner</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; color:#fff; font-family:sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
#header { padding:12px 16px; background:#111; display:flex; justify-content:space-between; align-items:center; }
#header h2 { font-size:16px; font-weight:700; }
#close-btn { background:rgba(255,255,255,.15); border:none; color:#fff; padding:8px 14px; border-radius:8px; font-size:14px; font-weight:700; cursor:pointer; }
#video-wrap { flex:1; position:relative; overflow:hidden; background:#000; }
video { width:100%; height:100%; object-fit:cover; display:block; }
#finder { position:absolute; top:50%; left:50%; transform:translate(-50%,-60%); width:70%; max-width:280px; aspect-ratio:3/2; border:3px solid rgba(255,100,100,.9); border-radius:8px; box-shadow:0 0 0 9999px rgba(0,0,0,.5); }
#line { position:absolute; top:15%; left:0; right:0; height:2px; background:rgba(255,80,80,.8); box-shadow:0 0 8px red; animation:scan 2s ease-in-out infinite; }
@keyframes scan { 0%,100%{top:15%} 50%{top:85%} }
#status { position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,.7); padding:10px 16px; text-align:center; font-size:14px; }
#result-banner { display:none; position:absolute; inset:0; background:rgba(0,150,0,.92); flex-direction:column; align-items:center; justify-content:center; gap:16px; }
#result-banner.show { display:flex; }
#result-code { font-size:26px; font-weight:900; font-family:monospace; letter-spacing:2px; text-align:center; padding:0 20px; word-break:break-all; }
#manual-wrap { padding:12px 16px; background:#111; display:flex; gap:8px; }
#manual-input { flex:1; background:#222; border:1px solid #444; color:#fff; padding:10px 12px; border-radius:8px; font-size:16px; }
#manual-btn { background:#2563eb; color:#fff; border:none; padding:10px 16px; border-radius:8px; font-weight:700; cursor:pointer; }
</style>
</head>
<body>
<div id="header">
  <h2 id="title">📷 Scanner</h2>
  <button id="close-btn" onclick="closeScanner()">✕ Fermer</button>
</div>
<div id="video-wrap">
  <video id="video" autoplay playsinline muted></video>
  <div id="finder"><div id="line"></div></div>
  <div id="result-banner">
    <div style="font-size:48px">✅</div>
    <div id="result-code"></div>
  </div>
  <div id="status">Démarrage...</div>
</div>
<div id="manual-wrap">
  <input id="manual-input" type="text" placeholder="Entrer manuellement..." autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false"/>
  <button id="manual-btn" onclick="submitManual()">✓</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/umd/index.min.js"></script>

<script>
var params = new URLSearchParams(window.location.search)
var mode = params.get('mode') || 'loc'
var scanning = true
var codeReader = null
var stream = null

document.getElementById('title').textContent = mode === 'loc' ? '📍 Localisation' : '📦 Pièce'

function setStatus(msg, color) {
  var el = document.getElementById('status')
  el.textContent = msg
  el.style.color = color || '#fff'
}

function sendToParent(value) {
  var clean = value.trim().toUpperCase()
  // Essayer toutes les méthodes possibles
  try { window.opener && window.opener.postMessage({type:'SCAN_RESULT',mode:mode,value:clean},'*') } catch(e){}
  try { window.parent !== window && window.parent.postMessage({type:'SCAN_RESULT',mode:mode,value:clean},'*') } catch(e){}
  // localStorage comme fallback universel
  try {
    localStorage.setItem('scanner_result', JSON.stringify({type:'SCAN_RESULT',mode:mode,value:clean,ts:Date.now()}))
  } catch(e){}
}

function submitResult(value) {
  if (!scanning) return
  scanning = false
  var clean = value.trim().toUpperCase()
  document.getElementById('result-code').textContent = clean
  document.getElementById('result-banner').classList.add('show')
  sendToParent(clean)
  stopCamera()
  setTimeout(closeScanner, 1000)
}

function submitManual() {
  var val = document.getElementById('manual-input').value.trim()
  if (val) submitResult(val)
}

document.getElementById('manual-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') submitManual()
})

function closeScanner() {
  stopCamera()
  try { window.close() } catch(e) {}
}

function stopCamera() {
  if (codeReader) { try { codeReader.reset() } catch(e){} codeReader = null }
  if (stream) { stream.getTracks().forEach(function(t){t.stop()}); stream = null }
}

async function startScanner() {
  var video = document.getElementById('video')
  try {
    setStatus('Démarrage caméra...')
    try {
      stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}}})
    } catch(e1) {
      try { stream = await navigator.mediaDevices.getUserMedia({video:true}) }
      catch(e2) { throw new Error('Caméra inaccessible: ' + e2.message) }
    }
    video.srcObject = stream
    await video.play()
    setStatus('Pointez vers le code-barres...')

    // Méthode 1: ZXingBrowser (meilleure compatibilité iOS/Android)
    if (typeof ZXingBrowser !== 'undefined') {
      try {
        codeReader = new ZXingBrowser.BrowserMultiFormatReader()
        codeReader.decodeFromVideoElement(video, function(result, err, controls) {
          if (!scanning) return
          if (result) submitResult(result.getText())
        })
        return
      } catch(e) { console.warn('ZXingBrowser failed:', e) }
    }

    // Méthode 2: BarcodeDetector natif (Chrome Android récent)
    if ('BarcodeDetector' in window) {
      var detector = new BarcodeDetector()
      var detect = async function() {
        if (!scanning) return
        try {
          var codes = await detector.detect(video)
          if (codes.length > 0) { submitResult(codes[0].rawValue); return }
        } catch(e) {}
        if (scanning) setTimeout(detect, 250)
      }
      setTimeout(detect, 500)
      return
    }

    setStatus('⚠️ Scan automatique non supporté — entrez manuellement', '#f59e0b')
    document.getElementById('manual-input').focus()

  } catch(err) {
    setStatus('❌ ' + err.message + ' — entrez manuellement ci-dessous', '#ef4444')
    document.getElementById('manual-input').focus()
  }
}

window.addEventListener('load', startScanner)
window.addEventListener('beforeunload', stopCamera)
</script>
</body>
</html>
